        .loader-circle {
            width: 120px; height: 120px; border: 4px solid rgba(138, 43, 226, 0.1);

            animation: spin 1s linear infinite; margin-bottom: 30px;

                        { lesson: "<h3>DÍA 1: Phishing</h3><p>Sitios falsos.</p>", q: "¿Cómo evitar?", opts: ["Confiar", "Verificar URL siempre", "Nada"], correct: 1 },
                        { lesson: "<h3>DÍA 2: SIM Swapping</h3><p>Robo de línea móvil.</p>", q: "¿Cómo blindar?", opts: ["SMS", "App Autenticadora (2FA)", "Llamar"], correct: 1 },
                        { lesson: "<h3>DÍA 3: Rug Pulls</h3><p>Robo de liquidez.</p>", q: "¿Señal roja?", opts: ["Equipo real", "Liquidez bloqueada 0", "Whitepaper"], correct: 1 },
                        { lesson: "<h3>DÍA 4: Ponzi</h3><p>Pirámides matemáticas.</p>", q: "¿Son sostenibles?", opts: ["Sí", "No, colapsan siempre", "A veces"], correct: 1 },
                        { lesson: "<h3>DÍA 5: Ingeniería Social</h3><p>Engaños por chat.</p>", q: "¿Qué hacer?", opts: ["Pagar", "Bloquear y reportar", "Hablar"], correct: 1 },
                        { lesson: "<h3>DÍA 6: Seguridad de PC</h3><p>Software limpio.</p>", q: "¿Vital?", opts: ["No", "Sí, evitar malware", "Poco"], correct: 1 },
                        { lesson: "<h3>DÍA 7: Graduación</h3><p>Maestría alcanzada.</p>", q: "¿Último paso?", opts: ["Borrar todo", "Sincronización final", "Nada"], correct: 1 }
                    ]
                }
            ]
        };

        let curMonth = 1, curWeek = 0, curDay = 0;

        function selectMonth(m) {
            curMonth = m;
            document.querySelectorAll('.month-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`m-btn-${m}`).classList.add('active');
            const sel = document.getElementById('week-selector'); sel.innerHTML = '';
            uniDB[m].forEach((w, i) => {
                sel.innerHTML += `<div class="week-card" id="w-btn-${i}" onclick="loadWeek(${i})">W${(m-1)*4 + i + 1}</div>`;
            });
            loadWeek(0);
        }

        function loadWeek(i) {
            curWeek = i; curDay = 0;
            document.querySelectorAll('.week-card').forEach(c => c.classList.remove('active'));
            if(document.getElementById(`w-btn-${i}`)) document.getElementById(`w-btn-${i}`).classList.add('active');
            render();
        }

        function render() {
            const w = uniDB[curMonth][curWeek], d = w.days[curDay];
            document.getElementById('lesson-area').innerHTML = `
                <div class="lesson-header">
                    <span style="color:var(--uni-purple); font-weight:900;">W${(curMonth-1)*4 + curWeek + 1} - ${w.title}</span>
                    <span style="color:var(--success);">DÍA ${curDay + 1}/7</span>
                </div>
                <div class="quiz-progress">${Array.from({length:7}, (_,i) => `<div class="prog-dot ${i<curDay?'done':(i==curDay?'active':'')}"></div>`).join('')}</div>
                <div class="data-block">${d.lesson}</div>
                <button class="btn btn-glow-purple mt-4" onclick="startQuiz()">TOMAR DESAFÍO DIARIO</button>
            `;
            document.getElementById('quiz-area').style.display = 'none';
        }

        function startQuiz() {
            document.getElementById('quiz-area').style.display = 'block';
            const d = uniDB[curMonth][curWeek].days[curDay];
            document.getElementById('quiz-content').innerHTML = `
                <p style="font-weight:700;">${d.q}</p>
                ${d.opts.map((o, i) => `<div class="quiz-option" onclick="check(${i}, ${d.correct})">
                    <span style="color:var(--uni-purple); font-weight:900;">[ ${String.fromCharCode(65+i)} ]</span> ${o}
                </div>`).join('')}
            `;
            document.getElementById('quiz-area').scrollIntoView({ behavior: 'smooth' });
        }

        function check(s, c) {
            const opts = document.querySelectorAll('.quiz-option'), key = `u_m${curMonth}_w${curWeek}_d${curDay}`;
            if(s === c) {
                opts[s].classList.add('correct');
                if(!uniQuizzesDone[key]) {
                    userHash += 250; updateBalance(); showReward(250);
                    uniQuizzesDone[key] = true; localStorage.setItem('uniQuizzesDone', JSON.stringify(uniQuizzesDone));
                }
                setTimeout(() => {
                    curDay++;
                    if(curDay < 7) render();
                    else alert("CICLO SEMANAL COMPLETADO");
                }, 800);
            } else { opts[s].classList.add('wrong'); alert("ERROR DE DATOS"); }
        }

        function showReward(a) { const p = document.getElementById('reward-popup'); document.getElementById('reward-amount').innerText = a; p.style.display = 'block'; setTimeout(() => p.style.display = 'none', 2000); }
        function updateBalance() { document.getElementById('global-hash').innerText = userHash.toLocaleString(); localStorage.setItem('userHash', userHash); }
        
        updateBalance(); selectMonth(1);
    </script>
</body>
</html>
