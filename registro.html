<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - HASHWAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000b18;
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            color: #00d4ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .auth-card {
            background: rgba(0, 31, 58, 0.7);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 25px 40px;
            width: 95%;
            max-width: 900px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .auth-header img { height: 45px; vertical-align: middle; margin-right: 15px; }
        .auth-title { display: inline-block; font-size: 1.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; color: white; }
        .auth-title .hash { color: #00d4ff; }
        .auth-title .war { color: #ff0066; text-shadow: 0 0 10px rgba(255, 0, 102, 0.3); }

        .register-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-label {
            font-size: 0.75rem;
            color: #00d4ff;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .form-input {
            background: rgba(0, 11, 24, 0.9);
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 5px;
            padding: 10px 15px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .form-input:focus {
            border-color: #00d4ff;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .full-row {
            grid-column: span 2;
            text-align: center;
            margin-top: 10px;
        }

        .form-submit {
            background: linear-gradient(90deg, #00d4ff, #8C5BFF);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            width: 100%;
        }
        .form-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .auth-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.8rem;
        }
        .auth-footer a { color: #00d4ff; text-decoration: none; margin: 0 10px; }
        .auth-footer a:hover { color: white; }

        @media (max-width: 700px) {
            .register-form-grid { grid-template-columns: 1fr; }
            .full-row { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-header">
        <img src="./public/img/logo1OK.png" alt="Logo">
        <h1 class="auth-title">REGISTRO USUARIO <span class="hash">HASH</span><span class="war">WAR</span></h1>
    </div>

    <form>
        <div class="register-form-grid">
            <div class="form-group">
                <label class="form-label">Alias de Minero</label>
                <input type="text" name="alias" class="form-input" required placeholder="Ej: Satoshi_99">
            </div>

            <div class="form-group">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" name="email" class="form-input" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label class="form-label">Nombre Real</label>
                <input type="text" name="nombre" class="form-input" required placeholder="Tu nombre">
            </div>

            <div class="form-group">
                <label class="form-label">Apellido Real</label>
                <input type="text" name="apellido" class="form-input" required placeholder="Tu apellido">
            </div>

            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-input" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label class="form-label">Confirmar Contraseña</label>
                <input type="password" name="password_confirm" class="form-input" required placeholder="••••••••">
            </div>

            <div class="form-group full-row">
                <button type="submit" class="form-submit">INICIAR OPERACIONES MINERAS</button>
                <p style="font-size: 0.65rem; color: #888; margin-top: 10px;">
                    Al registrarte aceptas los <a href="terminos.html" style="color:#00d4ff">Términos y Condiciones</a>.
                </p>
            </div>
        </div>
    </form>

    <div class="auth-footer">
        <a href="inicio.html?showLogin=true">¿Ya tienes cuenta? Inicia sesión</a> | 
        <a href="inicio.html">Volver atrás</a>
    </div>
</div>

</body>
</html>
